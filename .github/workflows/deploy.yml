name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'  

      - name: Restore dependencies
        run: dotnet restore back-end/back-end.sln

      - name: Build
        run: dotnet build back-end/back-end.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test back-end/back-end.sln --no-build --configuration Release --verbosity normal
  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd "${{ secrets.VPS_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            export DB_PASSWORD="${{ secrets.VPS_DB_PASSWORD }}"
            docker compose -p onlinemanga -f back-end/docker-compose.prod.yml down -v
            docker compose -p onlinemanga -f back-end/docker-compose.prod.yml build
            docker compose -p onlinemanga -f back-end/docker-compose.prod.yml up -d
            docker image prune -f
  healthcheck:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait for app to be healthy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd "${{ secrets.VPS_PATH }}"

            echo "Waiting for app to be healthy (timeout: 6 minutes)..."
            for i in $(seq 1 180); do
              if curl -sf http://localhost:8080/health > /dev/null; then
                echo "App is healthy! (took ~$((i * 2))s)"
                exit 0
              fi
              echo "Attempt $i/180: not ready yet, waiting 2s..."
              sleep 2
            done

            echo "ERROR: App did not become healthy after 6 minutes"
            docker compose -p onlinemanga -f back-end/docker-compose.prod.yml logs back-end --tail 50
            exit 1
